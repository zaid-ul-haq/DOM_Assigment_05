<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local Storage – Assignment 5</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Local Storage Assignment</h1>

  <div class="container">

    <!-- Task 1 : Save / Update Name -->
    <h2>Save Name</h2>
    <input type="text" id="nameInput" placeholder="Enter your name..." />
    <button id="saveBtn">Save Name</button>

    <!-- Task 2: Display saved name -->
    <p id="displayName">Saved Name: </p>

    <!-- Task 4: Remove Name -->
    <button id="removeBtn">Remove Name</button>

    <hr />

    <!-- Task 5: Dark Mode -->
    <h2>Task 5: Dark Mode</h2>
    <button id="darkBtn">Toggle Dark Mode</button>

    <hr />

    <!-- Task 6: Clear All -->
    <h2>Task 6: Clear All Data</h2>
    <button id="clearBtn">Clear All Data</button>

  </div>

  <script src="script.js"></script>
</body>
</html>
